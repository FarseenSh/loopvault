# rev = "framework/testnet" when publishing to testnet.
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "868c226359ef914f1f3b080518f27eb13d8967f5" }

[addresses]
loopvault = "0x0"
