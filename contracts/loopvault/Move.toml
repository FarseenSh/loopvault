[package]
name = "loopvault"
edition = "2024.beta"
version = "0.1.0"
license = "Apache-2.0"

[dependencies]
# Framework (Sui + MoveStdlib) is added implicitly (Sui >= 1.45) and resolves to the
# active env's on-chain system packages at publish time — so this package compiles
# and publishes against testnet's framework with no rev to keep in sync. LoopVault is
# self-contained (it does NOT depend on deepbook_predict — the Open PTB composes the
# predict calls at the transaction layer, not as a Move dependency).

[addresses]
loopvault = "0x0"
